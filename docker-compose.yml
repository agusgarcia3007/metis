name: metis

# Deploy Metis on a small box (tuned for ~4 GB RAM / 4 vCPU).
#
#   docker compose up -d --build         # starts ollama + metis (first run pulls ~1.5 GB of models)
#   docker compose run --rm metis index /app/docs   # build the Library from mounted docs
#   docker compose restart metis                     # serve picks up the new Library
#   curl -s localhost:8080/ask -d '{"q":"..."}'      # ask the HTTP API
#
# Put your own .md/.txt files in ./sample-docs (mounted read-only at /app/docs).

services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama-models:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=-1         # keep the Cortex pinned in RAM (no 82s cold reloads)
      - OLLAMA_MAX_LOADED_MODELS=2   # Cortex + tiny embedder fit together
      - OLLAMA_KV_CACHE_TYPE=q8_0    # halve KV-cache RAM so Qwen3-4B fits a 4 GB box
      - OLLAMA_CONTEXT_LENGTH=2048   # smaller context = less KV RAM (plenty for RAG)
    mem_limit: 3500m                 # Qwen3-4B Q4 (~2.5 GB) + KV + runtime; tight on a strict 4 GB box
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 20s

  metis:
    build: .
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - METIS_MODEL=qwen3:4b         # ~GPT-4o-mini-class reasoning, fits 4 GB; set qwen3:1.7b for speed
      - PORT=8080
      - METIS_INDEX_DIR=/app/docs    # auto-build the Library from mounted docs on startup
    ports:
      - "8080:8080"
    mem_limit: 384m                  # metis is a thin Go control plane
    volumes:
      - metis-lib:/app/library       # the swappable knowledge index (persisted)
      - ./sample-docs:/app/docs:ro   # your documents, mounted read-only

volumes:
  ollama-models:
  metis-lib:
